name = "profinish-api"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

[vars]
SITE_URL = "https://profinishusa.com"
# OWNER_EMAIL, OWNER_PHONE, ADAM_PHONE → set via wrangler secret put

[[d1_databases]]
binding = "DB"
database_name = "profinish"
database_id = "83b4b2ef-cd54-4b49-a54e-f5af5bdd97fe"

[[r2_buckets]]
binding = "R2"
bucket_name = "echo-prime-media"

[[services]]
binding = "DOC_DELIVERY"
service = "echo-document-delivery"

# [vars] secrets set via wrangler secret put:
# TWILIO_ACCOUNT_SID, TWILIO_AUTH_TOKEN, TWILIO_PHONE_NUMBER
# ECHO_API_KEY (for shared brain / memory prime)
# DOC_TENANT_KEY (tenant key for echo-document-delivery)

[[analytics_engine_datasets]]
binding = "ANALYTICS"
dataset = "echo_metrics"

# Daily automation: appointment reminders, overdue invoices, follow-ups
# Runs at 8 AM CST (14:00 UTC)
[triggers]
crons = ["0 14 * * *"]
